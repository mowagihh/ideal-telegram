name: RDP Tailscale Ultra Stable

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 350

    steps:
      - name: 1. Install Tailscale
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          Invoke-WebRequest https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi -OutFile tailscale.msi
          Start-Process msiexec.exe -ArgumentList "/i tailscale.msi /quiet /norestart" -Wait

          Write-Output "Waiting for Tailscale service..."
          for ($i = 0; $i -lt 30; $i++) {
            $svc = Get-Service -Name "Tailscale" -ErrorAction SilentlyContinue
            if ($svc -and $svc.Status -eq "Running") {
              Write-Output "Tailscale service is running."
              break
            }
            Start-Sleep -Seconds 2
          }

      - name: 2. Connect Tailscale
        shell: powershell
        timeout-minutes: 2
        run: |
          $ts = "$env:ProgramFiles\Tailscale\tailscale.exe"

          # ✅ أوقف أي اتصال قديم أولاً
          Write-Output "Resetting Tailscale..."
          & $ts logout 2>$null
          Start-Sleep -Seconds 3

          # ✅ Debug: نوع المفتاح
          $key = "${{ secrets.TAILSCALE_AUTHKEY }}"
          Write-Output "Key starts with: $($key.Substring(0,5))..."
          Write-Output "Key length: $($key.Length)"

          # ✅ استخدام Start-Process مع Timeout بدل ما يعلق
          Write-Output "Running tailscale up..."

          $pinfo = New-Object System.Diagnostics.ProcessStartInfo
          $pinfo.FileName = $ts
          $pinfo.Arguments = "up --authkey=$key --accept-routes --hostname=rdp-${{ github.run_id }}"
          $pinfo.RedirectStandardOutput = $true
          $pinfo.RedirectStandardError = $true
          $pinfo.UseShellExecute = $false

          $proc = [System.Diagnostics.Process]::Start($pinfo)
          $finished = $proc.WaitForExit(60000)  # 60 seconds timeout

          $stdout = $proc.StandardOutput.ReadToEnd()
          $stderr = $proc.StandardError.ReadToEnd()

          Write-Output "STDOUT: $stdout"
          Write-Output "STDERR: $stderr"

          if (-not $finished) {
            Write-Output "tailscale up TIMED OUT - killing process"
            $proc.Kill()
          }

          Write-Output "Exit code: $($proc.ExitCode)"

          # ✅ تحقق من الحالة بعدها
          Start-Sleep -Seconds 5
          Write-Output "=== Tailscale Status ==="
          & $ts status 2>&1 | ForEach-Object { Write-Output $_ }

          # ✅ جلب IP
          $ip = $null
          for ($i = 0; $i -lt 10; $i++) {
            $ip = (& $ts ip -4 2>$null)
            if ($ip -and $ip.Trim() -ne "") {
              $ip = $ip.Trim()
              break
            }
            Write-Output "Waiting for IP... attempt $($i+1)"
            Start-Sleep -Seconds 3
          }

          if (-not $ip) {
            Write-Error "No IP! Check your auth key type."
            exit 1
          }

          "TS_IP=$ip" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Output "TAILSCALE IP: $ip"

      - name: 3. Enable RDP
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=tcp localport=3389
          net user runneradmin "Rdp@123"
          net localgroup "Remote Desktop Users" runneradmin /add 2>$null
          Set-Service -Name "TermService" -StartupType Automatic
          Start-Service -Name "TermService"
          Write-Output "RDP READY!"

      - name: 4. Show Info + Keep Alive
        shell: powershell
        run: |
          $end = (Get-Date).AddMinutes(345)
          Write-Output "============================================"
          Write-Output "  IP  : $env:TS_IP"
          Write-Output "  USER: runneradmin"
          Write-Output "  PASS: Rdp@123"
          Write-Output "  PORT: 3389"
          Write-Output "============================================"

          while ((Get-Date) -lt $end) {
            Write-Output "$(Get-Date -Format 'HH:mm:ss') - Alive"
            Start-Sleep -Seconds 60
          }
