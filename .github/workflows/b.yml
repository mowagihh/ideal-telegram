name: RDP Tailscale Ultra Stable

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 350

    steps:
      - name: 1. Install Tailscale
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          Invoke-WebRequest https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi -OutFile tailscale.msi
          Start-Process msiexec.exe -ArgumentList "/i tailscale.msi /quiet /norestart" -Wait

          Write-Output "Waiting for Tailscale service..."
          $retries = 0
          while ($retries -lt 30) {
            $svc = Get-Service -Name "Tailscale" -ErrorAction SilentlyContinue
            if ($svc -and $svc.Status -eq "Running") {
              Write-Output "Tailscale service is running."
              break
            }
            Start-Sleep -Seconds 2
            $retries++
          }

          if ($retries -ge 30) {
            Write-Error "Tailscale service failed to start!"
            exit 1
          }

      - name: 2. Connect Tailscale
        shell: powershell
        timeout-minutes: 3
        run: |
          $ErrorActionPreference = "Stop"

          $ts = "$env:ProgramFiles\Tailscale\tailscale.exe"

          if (-not (Test-Path $ts)) {
            Write-Error "tailscale.exe not found!"
            exit 1
          }

          # ✅ Debug: تأكد إن المفتاح موجود (بدون طباعته)
          $key = "${{ secrets.TAILSCALE_AUTHKEY }}"
          if (-not $key -or $key.Length -lt 10) {
            Write-Error "TAILSCALE_AUTHKEY is missing or too short! Check your GitHub Secrets."
            exit 1
          }
          Write-Output "Auth key length: $($key.Length) chars - OK"

          # ✅ تشغيل Tailscale مع طباعة أي خطأ
          Write-Output "Connecting to Tailscale..."
          & $ts up --authkey=$key --accept-routes --reset --hostname="rdp-${{ github.run_id }}" 2>&1 | ForEach-Object { Write-Output $_ }

          if ($LASTEXITCODE -ne 0) {
            Write-Output "tailscale up failed with exit code: $LASTEXITCODE"
            Write-Output "Checking status..."
            & $ts status 2>&1 | ForEach-Object { Write-Output $_ }
            exit 1
          }

          Write-Output "Tailscale connected. Getting IP..."

          $ip = $null
          for ($i = 0; $i -lt 15; $i++) {
            Start-Sleep -Seconds 3
            $ip = (& $ts ip -4 2>$null)
            if ($ip -and $ip.Trim() -ne "") {
              $ip = $ip.Trim()
              break
            }
            Write-Output "Waiting for IP... attempt $($i+1)/15"
          }

          if (-not $ip) {
            Write-Error "No IP from Tailscale!"
            & $ts status
            exit 1
          }

          "TS_IP=$ip" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Output "TAILSCALE IP: $ip"

      - name: 3. Enable RDP
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" -Value 0

          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -Name "UserAuthentication" -Value 0

          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=tcp localport=3389

          net user runneradmin "Rdp@123"
          net localgroup "Remote Desktop Users" runneradmin /add 2>$null

          reg add "HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon" /v AutoAdminLogon /t REG_SZ /d 1 /f
          reg add "HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon" /v DefaultUsername /t REG_SZ /d runneradmin /f
          reg add "HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon" /v DefaultPassword /t REG_SZ /d "Rdp@123" /f

          Set-Service -Name "TermService" -StartupType Automatic
          Start-Service -Name "TermService"

          Write-Output "RDP READY!"

      - name: 4. Show Info + Keep Alive
        shell: powershell
        run: |
          $end = (Get-Date).AddMinutes(345)

          Write-Output ""
          Write-Output "============================================"
          Write-Output "         RDP CONNECTION DETAILS"
          Write-Output "============================================"
          Write-Output "  IP  : $env:TS_IP"
          Write-Output "  USER: runneradmin"
          Write-Output "  PASS: Rdp@123"
          Write-Output "  PORT: 3389"
          Write-Output "============================================"
          Write-Output ""

          while ((Get-Date) -lt $end) {
            Write-Output "$(Get-Date -Format 'HH:mm:ss') - Alive"
            Start-Sleep -Seconds 60
          }
