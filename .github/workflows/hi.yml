name: RDP Pro Fast (No Lag)

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest

    steps:
      - name: 1. Setup Tailscale (Auto Login)
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          $url = "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi"
          $path = "$env:TEMP\tailscale.msi"

          Invoke-WebRequest $url -OutFile $path
          Start-Process msiexec.exe -ArgumentList "/i `"$path`" /quiet /norestart" -Wait

          $ts = "$env:ProgramFiles\Tailscale\tailscale.exe"
          & $ts up --authkey=${{ secrets.TAILSCALE_AUTHKEY }} --accept-routes --hostname=rdp-${{ github.run_id }}

          Start-Sleep -Seconds 3

          $ip = & $ts ip -4
          echo "TS_IP=$ip" >> $env:GITHUB_ENV

      - name: 2. Enable RDP (Optimized)
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          # Enable RDP
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" -Value 0

          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          # Set Password
          net user runneradmin Rdp@123

          # Auto Login (fix black screen)
          reg add "HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon" /v AutoAdminLogon /t REG_SZ /d 1 /f
          reg add "HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon" /v DefaultUsername /t REG_SZ /d runneradmin /f
          reg add "HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon" /v DefaultPassword /t REG_SZ /d Rdp@123 /f

          # Performance Boost 🚀
          reg add "HKCU\Control Panel\Desktop" /v Wallpaper /t REG_SZ /d "" /f
          reg add "HKCU\Control Panel\Desktop" /v MenuShowDelay /t REG_SZ /d 0 /f
          reg add "HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects" /v VisualFXSetting /t REG_DWORD /d 2 /f

          Write-Host "RDP_OK"

      - name: 3. Print Info + Keep Alive
        shell: powershell
        run: |
          $end = (Get-Date).AddHours(24)

          Write-Host "=================================="
          Write-Host "🔥 RDP READY"
          Write-Host "IP: $env:TS_IP"
          Write-Host "User: runneradmin"
          Write-Host "Pass: Rdp@123"
          Write-Host "=================================="

          while ((Get-Date) -lt $end) {
            Write-Host (Get-Date)
            Start-Sleep -Seconds 60
          }
