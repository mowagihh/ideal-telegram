name: RDP Ultra Stable (No Errors)

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest

    steps:
      - name: 1. Install Tailscale
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host "[1] Installing Tailscale..."
          $url = "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi"
          $path = "$env:TEMP\tailscale.msi"

          Invoke-WebRequest $url -OutFile $path
          Start-Process msiexec.exe -ArgumentList "/i `"$path`" /quiet /norestart" -Wait

      - name: 2. Connect Tailscale
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host "[2] Connecting Tailscale..."
          $ts = "$env:ProgramFiles\Tailscale\tailscale.exe"

          & $ts up --authkey=${{ secrets.TAILSCALE_AUTHKEY }} --hostname=gh-rdp-${{ github.run_id }}

          Start-Sleep -Seconds 5

          $ip = & $ts ip -4
          echo "TS_IP=$ip" >> $env:GITHUB_ENV

          Write-Host "[OK] Tailscale IP: $ip"

      - name: 3. Enable RDP (Full Fix)
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host "[3] Enabling RDP..."

          # Enable RDP
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" -Value 0

          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          # Set user password
          net user runneradmin P@ssw0rd123

          # Auto login (fix black screen)
          reg add "HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon" /v AutoAdminLogon /t REG_SZ /d 1 /f
          reg add "HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon" /v DefaultUsername /t REG_SZ /d runneradmin /f
          reg add "HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon" /v DefaultPassword /t REG_SZ /d P@ssw0rd123 /f

          # Performance tweaks
          reg add "HKCU\Control Panel\Desktop" /v Wallpaper /t REG_SZ /d "" /f
          reg add "HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects" /v VisualFXSetting /t REG_DWORD /d 2 /f

          Write-Host "[OK] RDP Enabled Successfully"

      - name: 4. Keep Alive + Info
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          $end = (Get-Date).AddHours(24)

          Write-Host "====================================="
          Write-Host "🔥 RDP READY"
          Write-Host "IP: $env:TS_IP"
          Write-Host "User: runneradmin"
          Write-Host "Pass: P@ssw0rd123"
          Write-Host "Port: 3389"
          Write-Host "====================================="

          while ((Get-Date) -lt $end) {
            $now = Get-Date
            Write-Host ("Running... " + $now)
            Start-Sleep -Seconds 60
          }
