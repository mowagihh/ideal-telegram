name: RDP Stable (Mobile Ready)

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest

    steps:
      - name: 1. Install Tailscale
        shell: powershell
        run: |
          $url = "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi"
          $path = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest $url -OutFile $path
          Start-Process msiexec.exe -ArgumentList "/i `"$path`" /quiet /norestart" -Wait

      - name: 2. Connect Tailscale
        shell: powershell
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTHKEY }} --hostname=gh-rdp-${{ github.run_id }}
          $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          echo "TS_IP=$ip" >> $env:GITHUB_ENV

      - name: 3. Enable RDP + Fix Session
        shell: powershell
        run: |
          Write-Host "[INFO] Enable RDP..."

          # Enable RDP
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" -Value 0

          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          # Fix blank screen / session issues
          reg add "HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon" /v AutoAdminLogon /t REG_SZ /d 1 /f
          reg add "HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon" /v DefaultUsername /t REG_SZ /d runneradmin /f
          reg add "HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon" /v DefaultPassword /t REG_SZ /d P@ssw0rd123 /f

          # Set password
          net user runneradmin P@ssw0rd123

          # Improve performance
          reg add "HKCU\Software\Microsoft\Terminal Server Client" /v DisableWallpaper /t REG_DWORD /d 1 /f

          Write-Host "[SUCCESS] RDP READY"

      - name: 4. Show Info + Keep Alive
        shell: powershell
        run: |
          $end = (Get-Date).AddHours(24)

          Write-Host "=============================="
          Write-Host "RDP READY 🔥"
          Write-Host "IP: $env:TS_IP"
          Write-Host "User: runneradmin"
          Write-Host "Pass: P@ssw0rd123"
          Write-Host "Port: 3389"
          Write-Host "=============================="

          while ((Get-Date) -lt $end) {
            Write-Host "Running... $(Get-Date)"
            Start-Sleep -Seconds 60
          }
