name: RustDesk Pure (No Tailscale - No Key)

on:
  workflow_dispatch:
    inputs:
      duration_hours:
        description: 'كم ساعة عايزة الـ runner يفضل شغال؟ (6 أو 8 أو 12...)'
        required: true
        default: '6'
        type: number

concurrency:
  group: rustdesk-pure-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rustdesk:
    runs-on: windows-2022
    timeout-minutes: 400

    steps:
      - name: 1. Python Libs (اختياري)
        shell: pwsh
        run: pip install pyautogui psutil --quiet

      - name: 2. RustDesk Install + ID + Password (إصدار 1.4.6 - أحدث)
        shell: pwsh
        run: |
          $rdUrl = "https://github.com/rustdesk/rustdesk/releases/download/1.4.6/rustdesk-1.4.6-x86_64.exe"
          $rdInstaller = "rustdesk.exe"
          Write-Host "Downloading RustDesk..."
          Invoke-WebRequest -Uri $rdUrl -OutFile $rdInstaller

          Write-Host "Silent Install..."
          Start-Process $rdInstaller -ArgumentList "--silent-install" -Wait
          Start-Sleep -Seconds 12

          $rd = "C:\Program Files\RustDesk\rustdesk.exe"

          if (-Not (Test-Path $rd)) {
            Write-Error "RustDesk not found!"
            exit 1
          }

          Write-Host "Installing RustDesk Service..."
          & $rd --install-service

          # Retry loop مبسط وآمن
          $id = $null
          $attempt = 0
          while ($attempt -lt 10 -and -not $id) {
            $attempt++
            Write-Host "Attempt $attempt/10 to get ID..."
            Start-Sleep -Seconds 8

            $raw = & $rd --get-id 2>$null
            $clean = $raw.Trim()

            if (\( clean -match '^[0-9]{6,10} \)') {
              $id = $clean
              Write-Host "✅ Success! RustDesk ID = $id"
            } else {
              Start-Sleep -Seconds 5
            }
          }

          if (-not $id) {
            Write-Error "Failed to get ID after 10 attempts"
            exit 1
          }

          $pass = "disalardp2026"
          Write-Host "Setting password..."
          & $rd --password $pass

          "RUSTDESK_ID=$id" >> $env:GITHUB_ENV
          "RUSTDESK_PASS=$pass" >> $env:GITHUB_ENV

      - name: 3. Final Info + Keep-Alive (Custom Duration)
        if: always()
        shell: pwsh
        env:
          DURATION_HOURS: ${{ inputs.duration_hours }}
        run: |
          Write-Host "`n══════════════════════════════════════"
          Write-Host "RustDesk Pure Ready - $env:DURATION_HOURS ساعة"
          Write-Host "ID       : $env:RUSTDESK_ID"
          Write-Host "Pass     : $env:RUSTDESK_PASS"
          Write-Host "══════════════════════════════════════`n"
          Write-Host "ازاي تتصلي:"
          Write-Host "1. حملي تطبيق RustDesk على جهازك"
          Write-Host "2. افتحيه وادخلي الـ ID + الـ Password"
          Write-Host "3. اضغطي Connect (هيشتغل فوراً)"

          $endTime = (Get-Date).AddHours($env:DURATION_HOURS)
          while ((Get-Date) -lt $endTime) {
              Write-Host "$(Get-Date -Format 'HH:mm:ss') | RustDesk $env:RUSTDESK_ID | Online"
              Start-Sleep -Seconds (Get-Random -Minimum 45 -Maximum 75)
          }
          Write-Host "Session ended safely."            } else {
              Start-Sleep -Seconds 5
            }
          }

          if (-not $id) {
            Write-Error "Failed to get ID after 10 attempts"
            exit 1
          }

          $pass = "disalardp2026"   # غيّريها لو عايزة
          Write-Host "Setting password..."
          & $rd --password $pass

          "RUSTDESK_ID=$id" >> $env:GITHUB_ENV
          "RUSTDESK_PASS=$pass" >> $env:GITHUB_ENV
